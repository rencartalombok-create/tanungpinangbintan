name: 🚀 Deploy ke GitHub Pages

on:
  push:
    branches:
      - main
  # Izinkan manual trigger dari tab Actions
  workflow_dispatch:

# Permissions untuk GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Hanya 1 deployment berjalan sekaligus
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────
  # Job 1: Build (persiapan & optimisasi)
  # ──────────────────────────────────────
  build:
    name: 📦 Build & Prepare
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v5

      # Minify HTML agar loading lebih cepat di production
      - name: 📦 Install html-minifier
        run: npm install -g html-minifier-terser

      - name: 🗜️ Minify index.html
        run: |
          html-minifier-terser \
            --collapse-whitespace \
            --remove-comments \
            --remove-optional-tags \
            --remove-redundant-attributes \
            --remove-script-type-attributes \
            --use-short-doctype \
            --minify-css true \
            --minify-js true \
            index.html -o index.html
          echo "✅ HTML berhasil diminify"

      # Minify CSS
      - name: 📦 Install clean-css-cli
        run: npm install -g clean-css-cli

      - name: 🗜️ Minify style.css
        run: |
          cleancss -o style.min.css style.css
          mv style.min.css style.css
          echo "✅ CSS berhasil diminify"

      # Minify JS
      - name: 📦 Install terser
        run: npm install -g terser

      - name: 🗜️ Minify script.js
        run: |
          terser script.js -o script.min.js \
            --compress \
            --mangle
          mv script.min.js script.js
          echo "✅ JS berhasil diminify"

      - name: 📊 Tampilkan ukuran file setelah optimisasi
        run: |
          echo "=== Ukuran File Final ==="
          du -sh index.html style.css script.js assets/
          echo "========================="

      - name: 📤 Upload artifact untuk deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

  # ──────────────────────────────────────
  # Job 2: Deploy ke GitHub Pages
  # ──────────────────────────────────────
  deploy:
    name: 🌐 Deploy ke GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🚀 Deploy ke Pages
        id: deployment
        uses: actions/deploy-pages@v4
